name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Show Rust dependency tree
        working-directory: desktop/src-tauri
        run: cargo tree | findstr "brotli alloc-no-stdlib alloc-stdlib"

      - name: Build Tauri Windows app
        working-directory: desktop
        run: npm run tauri build

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: ks-unify-windows
          path: desktop/src-tauri/target/release/bundle/**
