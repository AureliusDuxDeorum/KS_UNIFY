name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows backend sidecar
        run: |
          pyinstaller --onefile --name ks-unify-backend-x86_64-pc-windows-msvc backend_sidecar.py

      - name: Place Windows backend sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "desktop\src-tauri\binaries"
          Copy-Item "dist\ks-unify-backend-x86_64-pc-windows-msvc.exe" "desktop\src-tauri\binaries\ks-unify-backend-x86_64-pc-windows-msvc.exe" -Force

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Show Rust dependency tree
        working-directory: desktop/src-tauri
        run: cargo tree | findstr "brotli alloc-no-stdlib alloc-stdlib"

      - name: Build Tauri Windows app
        working-directory: desktop
        run: npm run tauri build

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: ks-unify-windows
          path: desktop/src-tauri/target/release/bundle/**
